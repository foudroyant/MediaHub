<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - MediaHub</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script src="/static/js/tailwind.min.js"></script>
    <script src="/static/js/htmx.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 px-4 py-3">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
            <a href="/" class="text-xl font-bold text-indigo-400 hover:text-indigo-300 shrink-0">MediaHub</a>
            <div class="flex items-center gap-4 sm:gap-6 text-sm flex-1">
                <a href="/" class="hover:text-indigo-400 transition">Accueil</a>
                <a href="/library" class="hover:text-indigo-400 transition">Bibliothèque</a>
                <a href="/settings" class="hover:text-indigo-400 transition">Paramètres</a>
            </div>
            <input type="search"
                   name="q"
                   placeholder="Rechercher..."
                   hx-get="/search"
                   hx-trigger="keyup changed delay:300ms, search"
                   hx-target="#content-area"
                   hx-swap="innerHTML"
                   class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-1.5 text-sm w-full sm:w-48 md:w-64 focus:outline-none focus:border-indigo-500">
        </div>
    </nav>
    <main class="max-w-6xl mx-auto p-4">
        <div id="content-area">
            {{template "content" .}}
        </div>
    </main>
</body>
</html>
